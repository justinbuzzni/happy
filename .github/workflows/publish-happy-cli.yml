name: Publish @namsangboy/happy-cli

# Triggered by a tag of the form `happy-cli-v<semver>`. The tag's version
# (after the prefix) MUST match packages/happy-cli/package.json's version
# or the job fails before publishing — prevents accidental version drift.
#
# First-time setup (one time only):
#   1. `npm login` locally as namsangboy, then `npm token create --read-only`
#      or `--publish` and copy the token.
#   2. In GitHub repo Settings → Secrets and variables → Actions → New
#      repository secret: NPM_TOKEN = <the token from step 1>.
#   3. Bump version in packages/happy-cli/package.json.
#   4. `git tag happy-cli-v1.1.4-aplus.0 && git push origin happy-cli-v1.1.4-aplus.0`.

on:
    push:
        tags:
            - 'happy-cli-v*'

jobs:
    publish:
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            id-token: write  # enables npm provenance
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: yarn
                  registry-url: https://registry.npmjs.org

            - name: Install monorepo dependencies
              run: yarn install --frozen-lockfile

            - name: Verify tag matches package version
              run: |
                  VERSION=$(node -p "require('./packages/happy-cli/package.json').version")
                  TAG="${GITHUB_REF#refs/tags/happy-cli-v}"
                  if [ "$VERSION" != "$TAG" ]; then
                      echo "::error::tag/version mismatch — tag=$TAG package.json=$VERSION"
                      exit 1
                  fi
                  echo "OK — publishing $VERSION from tag happy-cli-v$TAG"

            - name: Build happy-cli
              working-directory: packages/happy-cli
              run: yarn build

            - name: Publish to npm
              working-directory: packages/happy-cli
              # `--ignore-scripts` skips prepublishOnly because we already ran
              # `yarn build` explicitly above; running it again from within
              # `npm publish` would repeat work and break `yarn.lock` hoisting.
              run: npm publish --access public --ignore-scripts
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_CONFIG_PROVENANCE: 'true'
